name: Alpha Release

on:
  push:
    branches: [ v1.20.1 ]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle Wrapper
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.5

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(grep "^mod_version=" gradle.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Generate new alpha version
        id: new_version
        run: |
          CURRENT_VERSION="${{ steps.current_version.outputs.current_version }}"
          
          if [[ "$CURRENT_VERSION" =~ ^(.+)-a([0-9]+)$ ]]; then
            # Version has alpha suffix, increment alpha number
            BASE_VERSION="${BASH_REMATCH[1]}"
            ALPHA_NUM="${BASH_REMATCH[2]}"
            NEW_ALPHA_NUM=$((ALPHA_NUM + 1))
            NEW_VERSION="${BASE_VERSION}-a${NEW_ALPHA_NUM}"
          else
            # Version doesn't have alpha suffix, add a1
            NEW_VERSION="${CURRENT_VERSION}-a1"
          fi
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version will be: $NEW_VERSION"

      - name: Update version in gradle.properties
        run: |
          sed -i "s/^mod_version=.*/mod_version=${{ steps.new_version.outputs.new_version }}/" gradle.properties
          echo "Updated gradle.properties with new version: ${{ steps.new_version.outputs.new_version }}"

      - name: Commit version update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gradle.properties
          git commit -m "Bump version to ${{ steps.new_version.outputs.new_version }} for alpha release [skip ci]" || exit 0
          git push origin HEAD:${{ github.ref_name }}

      - name: Build with Gradle
        run: ./gradlew build --no-daemon
        env:
          CLOUDSMITH_USER: ${{ secrets.CLOUDSMITH_USER }}
          CLOUDSMITH_TOKEN: ${{ secrets.CLOUDSMITH_TOKEN }}
